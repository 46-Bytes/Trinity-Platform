name: Deploy backend to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "infra/**"
  workflow_dispatch: {}

env:
  ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  API_APP_NAME: ${{ secrets.AZURE_API_APP_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image via ACR
        run: |
          IMAGE="${ACR_NAME}.azurecr.io/trinity-backend:${{ github.sha }}"
          az acr build --registry "$ACR_NAME" --image "trinity-backend:${{ github.sha }}" ./backend
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Update API container app
        run: |
          az containerapp update \
            --name "$API_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE"
